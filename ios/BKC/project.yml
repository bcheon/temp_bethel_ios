name: BKC
options:
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: YOUR_TEAM_ID
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ENABLE_BITCODE: NO

packages:
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 12.0.0

targets:
  BKC:
    type: application
    platform: iOS
    sources:
      - BKC
    resources:
      - BKC/Resources
    settings:
      base:
        PRODUCT_NAME: BKC
        PRODUCT_BUNDLE_IDENTIFIER: org.bkc.churchapp
        INFOPLIST_FILE: BKC/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: BKC/Resources/BKC.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: FirebaseSDK
        product: FirebaseMessaging
      - target: BKCNotificationServiceExtension
        embed: true
    info:
      path: BKC/Resources/Info.plist

  BKCNotificationServiceExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: BKCNotificationServiceExtension
        excludes:
          - "**/*Tests.swift"
    settings:
      base:
        PRODUCT_NAME: BKCNotificationServiceExtension
        PRODUCT_BUNDLE_IDENTIFIER: org.bkc.churchapp.NotificationService
        INFOPLIST_FILE: BKCNotificationServiceExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: BKCNotificationServiceExtension/BKCNotificationServiceExtension.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"

  BKCTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BKCTests
    settings:
      base:
        PRODUCT_NAME: BKCTests
        PRODUCT_BUNDLE_IDENTIFIER: org.bkc.churchapp.BKCTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/BKC.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BKC
        BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: BKC
      - package: FirebaseSDK
        product: FirebaseMessaging

  BKCUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - BKCUITests
    settings:
      base:
        PRODUCT_NAME: BKCUITests
        PRODUCT_BUNDLE_IDENTIFIER: org.bkc.churchapp.BKCUITests
        TEST_TARGET_NAME: BKC
    dependencies:
      - target: BKC

schemes:
  BKC:
    build:
      targets:
        BKC: all
        BKCNotificationServiceExtension: all
        BKCTests: [test]
        BKCUITests: [test]
    test:
      targets:
        - BKCTests
        - BKCUITests
      gatherCoverageData: false
