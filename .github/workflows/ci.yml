name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-workflows:
    name: Lint workflow YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  wp-test:
    name: WordPress Plugin Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3"]

    defaults:
      run:
        working-directory: wordpress-plugin/bkc-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, openssl
          tools: composer:v2
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('wordpress-plugin/bkc-push/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  ios-test:
    name: iOS Unit Tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd ios/BKC && xcodegen generate

      - name: Resolve Swift packages
        run: |
          cd ios/BKC && xcodebuild \
            -resolvePackageDependencies \
            -project BKC.xcodeproj \
            -scheme BKC

      - name: Pick a destination simulator
        id: sim
        run: |
          # Find an available iPhone simulator regardless of model number across runner images.
          SIM_NAME="$(xcrun simctl list devices available | grep -oE 'iPhone [^ ]+' | head -1 || true)"
          if [ -z "$SIM_NAME" ]; then
            echo "No iPhone simulator available" >&2
            xcrun simctl list devices available
            exit 1
          fi
          echo "name=$SIM_NAME" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $SIM_NAME"

      - name: Run tests (unit + UI)
        run: |
          set -o pipefail
          cd ios/BKC && xcodebuild test \
            -project BKC.xcodeproj \
            -scheme BKC \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }},OS=latest" \
            -resultBundlePath build/Test.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ios/BKC/build/Test.xcresult
          retention-days: 14
